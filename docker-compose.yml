services:
  app:
    build: .
    env_file:
      - backend/.env          # APP_PASSWORD, JWT_SECRET, ANTHROPIC_API_KEY, ...
    environment:
      - DATABASE_URL=sqlite:////data/app.db
    volumes:
      - ./data:/data          # SQLite database persists here
    ports:
      - "8000:8000"           # direct access (optional if you use the tunnel)
    restart: unless-stopped

  # Optional: public HTTPS URL with no open ports / firewall changes.
  # Put TUNNEL_TOKEN in backend/.env, then: docker compose --profile tunnel up -d
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    env_file:
      - backend/.env          # must contain TUNNEL_TOKEN=...
    restart: unless-stopped
    depends_on:
      - app
    profiles: ["tunnel"]
